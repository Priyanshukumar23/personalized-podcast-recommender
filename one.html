<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Podcast Recommender</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            background-color: #6a11cb;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 20px auto;
            width: 90%;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
        }
        
        .bot-message {
            background-color: #f1f1f1;
            color: #333;
            border-bottom-left-radius: 5px;
            align-self: flex-start;
        }
        
        .user-message {
            background-color: #6a11cb;
            color: white;
            border-bottom-right-radius: 5px;
            margin-left: auto;
            align-self: flex-end;
        }
        
        .input-area {
            display: flex;
            padding: 15px;
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
        }
        
        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            background-color: #f1f1f1;
            font-size: 16px;
            outline: none;
        }
        
        #send-button {
            background-color: #6a11cb;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 24px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        
        #send-button:hover {
            background-color: #4d0b9a;
        }
        
        .podcast-card {
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #6a11cb;
        }
        
        .podcast-title {
            font-weight: bold;
            color: #6a11cb;
            margin-bottom: 5px;
            font-size: 18px;
        }
        
        .podcast-info {
            display: flex;
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .podcast-genre {
            background-color: #e6e6e6;
            padding: 3px 8px;
            border-radius: 10px;
            margin-right: 10px;
        }
        
        .podcast-link {
            display: block;
            color: #6a11cb;
            margin-top: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        
        .podcast-link:hover {
            text-decoration: underline;
        }
        
        .typing-indicator {
            display: inline-block;
            padding: 10px 15px;
            background-color: #f1f1f1;
            border-radius: 18px;
            border-bottom-left-radius: 5px;
        }
        
        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #999;
            margin: 0 3px;
            animation: typingAnimation 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typingAnimation {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-5px);
            }
        }
    </style>
</head>
<body>

        <h1>Personalized Podcast Recommender</h1>
        <p>Discover podcasts tailored to your interests</p>
    </div>
    
    <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
            <!-- Messages will appear here -->
        </div>
        
        <div class="input-area">
            <input type="text" id="user-input" placeholder="What type of podcasts are you interested in?" autocomplete="off">
            <button id="send-button">Send</button>
        </div>
    </div>

        // We'll use the ListenNotes API for podcast recommendations

        const API_KEY = 'Your api'; // Replace with your actual API key
        
        document.addEventListener('DOMContentLoaded', function() {
            const chatMessages = document.getElementById('chat-messages');
            const userInput = document.getElementById('user-input');
            const sendButton = document.getElementById('send-button');
            
            // Initial bot message
            addBotMessage("Hello! I'm your Personalized Podcast Recommender. Tell me what topics you're interested in, and I'll suggest great podcasts for you!");
            addBotMessage("You can ask for podcasts by category (technology, business, health), language, or popularity.");
            
            // Send message when button is clicked or Enter is pressed
            sendButton.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            function sendMessage() {
                const message = userInput.value.trim();
                if (message) {
                    addUserMessage(message);
                    userInput.value = '';
                    
                    // Show typing indicator
                    showTypingIndicator();
                    
                    // Process the message after a short delay
                    setTimeout(() => {
                        removeTypingIndicator();
                        processUserInput(message);
                    }, 1500);
                }
            }
            
            function showTypingIndicator() {
                const typingIndicator = document.createElement('div');
                typingIndicator.className = 'message bot-message typing-indicator';
                typingIndicator.innerHTML = `
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                `;
                typingIndicator.id = 'typing-indicator';
                chatMessages.appendChild(typingIndicator);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            function removeTypingIndicator() {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) {
                    chatMessages.removeChild(indicator);
                }
            }
            
            function addUserMessage(text) {
                const messageElement = document.createElement('div');
                messageElement.className = 'message user-message';
                messageElement.textContent = text;
                chatMessages.appendChild(messageElement);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            function addBotMessage(text) {
                const messageElement = document.createElement('div');
                messageElement.className = 'message bot-message';
                messageElement.textContent = text;
                chatMessages.appendChild(messageElement);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            function addPodcastCard(podcast) {
                const podcastCard = document.createElement('div');
                podcastCard.className = 'podcast-card';
                
                podcastCard.innerHTML = `
                    <div class="podcast-title">${podcast.title}</div>
                    <div>${podcast.description || 'No description available'}</div>
                    <div class="podcast-info">
                        <div class="podcast-genre">${podcast.genre || 'General'}</div>
                        <div>${podcast.publisher || 'Unknown publisher'}</div>
                    </div>
                    ${podcast.website ? `<a href="${podcast.website}" class="podcast-link" target="_blank">Visit podcast</a>` : ''}
                `;
                
                chatMessages.appendChild(podcastCard);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
